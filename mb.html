<!DOCTYPE html>
<html>
<head>
  <title>ESP32 to Firebase</title>
</head>
<body>
<h2>ESP32 Time Data:</h2>
<h3 id="data">Loading...</h3>

<script>
setInterval(async () => {
  try {
    // 1️⃣ ESP32 se JSON data lo
    let res = await fetch("http://192.168.8.110/data.json"); 
    let data = await res.json();
    let espTime = data.time;

    document.getElementById("data").innerText = espTime + " sec";

    // 2️⃣ Firebase me send karo
    
}, 5000); // 3 sec interval
</script>
</body>
</html>
