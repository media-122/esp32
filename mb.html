<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 Live Data</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
    h1 { color: #333; }
    #time { font-size: 2em; color: #007BFF; }
    #status { color: red; margin-top: 10px; }
  </style>
</head>
<body>

<h1>ESP32 Live Data</h1>
<div>Time (seconds): <span id="time">Loading...</span></div>
<div id="status"></div>

<script>
async function fetchESPData() {
  const timeElem = document.getElementById("time");
  const statusElem = document.getElementById("status");

  try {
    // ESP32 ka JSON endpoint
    const res = await fetch("http://192.168.8.110/data.json");
    if(!res.ok) throw new Error("ESP32 Not Responding");

    const data = await res.json();
    timeElem.innerText = data.time;
    statusElem.innerText = "";

  } catch(e) {
    statusElem.innerText = "Error: " + e.message;
  }
}

// 1 sec interval pe refresh
setInterval(fetchESPData, 5000);
fetchESPData(); // page load par bhi fetch
</script>

</body>
</html>
